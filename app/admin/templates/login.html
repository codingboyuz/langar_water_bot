<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — Langar Water</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: { 100:'#dbe7fe',200:'#bfd3fe',300:'#93b4fb',400:'#5b8def',500:'#2563eb',600:'#1d4ed8',700:'#1e40af',900:'#0f1e3d' },
      ink: { 400:'#94a3b8',500:'#64748b',700:'#334155',900:'#0f172a' }
    }}}}
  </script>
  <style>
    *{ font-family:'Inter','Segoe UI',system-ui,sans-serif; }
    html,body{ height:100%; }
    body{
      margin:0; overflow:hidden; position:relative;
      background:linear-gradient(135deg,#0a1530,#0f1e3d,#13254b,#102a57,#0f1e3d);
      background-size:400% 400%; animation:gradientShift 20s ease infinite;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    /* Rangli blob'lar */
    .blob{ position:absolute; border-radius:9999px; filter:blur(80px); opacity:.45; pointer-events:none; }
    @keyframes float1{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-40px)} }
    @keyframes float2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,50px)} }
    @keyframes float3{ 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,30px) scale(1.1)} }

    /* Ko'tariluvchi suv pufakchalari */
    .bubbles{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
    .bubble{
      position:absolute; bottom:-80px; border-radius:9999px; pointer-events:auto; cursor:pointer;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.45), rgba(147,180,251,.12) 60%, transparent 70%);
      border:1px solid rgba(255,255,255,.12); will-change:transform, opacity;
    }
    @keyframes rise{
      0%{ transform:translateY(0) scale(.5); opacity:0; }
      10%{ opacity:.55; }
      85%{ opacity:.4; }
      100%{ transform:translateY(-112vh) scale(1); opacity:0; }
    }

    /* Mayda nuqtali to'r (subtle) */
    .grid-overlay{ position:absolute; inset:0; pointer-events:none; opacity:.5;
      background-image:radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px); background-size:26px 26px;
      mask-image:radial-gradient(circle at 50% 45%, #000 30%, transparent 75%); }

    /* Karta */
    @keyframes cardIn{ from{opacity:0; transform:translateY(24px) scale(.97)} to{opacity:1; transform:none} }
    @keyframes fieldIn{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .card-in{ animation:cardIn .7s cubic-bezier(.22,.61,.36,1) both; }
    .field{ opacity:0; animation:fieldIn .5s ease forwards; }

    .glass{ background:rgba(255,255,255,.97); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    .inp{ transition:border-color .2s ease, box-shadow .2s ease, background .2s ease; }
    .inp:focus{ box-shadow:0 0 0 4px rgba(37,99,235,.14); }

    /* Tugma yaltirashi */
    .btn-shine{ position:relative; overflow:hidden; }
    .btn-shine::after{ content:''; position:absolute; top:0; left:-130%; width:55%; height:100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent); transform:skewX(-20deg); transition:left .65s ease; }
    .btn-shine:hover::after{ left:135%; }
  </style>
</head>
<body class="flex items-center justify-center">

  <!-- Fon: blob'lar -->
  <div class="blob bg-brand-500 w-[460px] h-[460px] top-[-90px] left-[-70px]" style="animation:float1 13s ease-in-out infinite"></div>
  <div class="blob bg-blue-400 w-[380px] h-[380px] bottom-[-110px] right-[-70px]" style="animation:float2 16s ease-in-out infinite"></div>
  <div class="blob w-[300px] h-[300px] top-[35%] right-[12%]" style="background:#7c5cff;animation:float3 18s ease-in-out infinite"></div>

  <!-- Fon: nuqtali to'r -->
  <div class="grid-overlay"></div>

  <!-- Fon: ko'tariluvchi suv sharchalari (JS bilan generatsiya, kursor tegsa yoriladi) -->
  <div class="bubbles" id="bubbles"></div>

  <!-- Login kartasi -->
  <div class="card-in relative z-10 w-full max-w-[400px] mx-4">
    <div class="glass rounded-3xl shadow-2xl overflow-hidden ring-1 ring-white/40 border border-white/30">

      <!-- Karta sarlavhasi -->
      <div class="relative px-8 pt-9 pb-8 text-center text-white overflow-hidden"
           style="background:linear-gradient(160deg,#13254b,#0f1e3d 60%,#0b1730)">
        <div class="absolute -top-10 -right-8 w-40 h-40 rounded-full" style="background:radial-gradient(circle,rgba(91,141,239,.35),transparent 70%)"></div>
        <div class="relative w-16 h-16 mx-auto mb-3.5 rounded-2xl bg-brand-500/20 ring-1 ring-white/15 flex items-center justify-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="#93b4fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="width:30px;height:30px">
            <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
          </svg>
        </div>
        <h1 class="relative text-[19px] font-bold tracking-tight">Langar Water</h1>
        <p class="relative text-brand-200 text-[13px] mt-1">Boshqaruv tizimiga kirish</p>
      </div>

      <!-- Forma -->
      <div class="p-8">
        {% if error %}
          <div class="bg-red-50 border border-red-100 text-red-600 text-[13px] rounded-xl px-4 py-2.5 mb-5 text-center" style="animation:fieldIn .4s ease both">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login" class="space-y-4">
          <div class="field" style="animation-delay:.15s">
            <label class="block text-[13px] text-ink-700 mb-1.5 font-medium">Login</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-400">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>
              </span>
              <input name="login" required autofocus autocomplete="username"
                     class="inp w-full pl-10 pr-3.5 py-2.5 rounded-xl border border-slate-200 focus:border-brand-500 outline-none text-sm bg-white/70">
            </div>
          </div>
          <div class="field" style="animation-delay:.25s">
            <label class="block text-[13px] text-ink-700 mb-1.5 font-medium">Parol</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-400">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input name="password" type="password" required autocomplete="current-password"
                     class="inp w-full pl-10 pr-3.5 py-2.5 rounded-xl border border-slate-200 focus:border-brand-500 outline-none text-sm bg-white/70">
            </div>
          </div>
          <button class="btn-shine field w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 active:scale-[.98] text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg shadow-brand-600/30 flex items-center justify-center gap-2"
                  style="animation-delay:.35s">
            <span>Kirish</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-white/40 text-[11.5px] mt-5 field" style="animation-delay:.5s">© Langar Water — Boshqaruv tizimi</p>
  </div>

  <script>
    (function(){
      const wrap = document.getElementById('bubbles');
      if(!wrap) return;
      const N = 40;  // sharchalar soni (ko'paytirildi)
      const rnd = (a,b)=> a + Math.random()*(b-a);

      function spawn(b){
        b.style.transition = 'none';
        b.style.opacity = '';
        b.style.transform = '';
        const size = rnd(9, 46);
        b.style.left = rnd(0, 97) + '%';
        b.style.width = b.style.height = size + 'px';
        b.style.animation = 'none';
        void b.offsetWidth;  // reflow
        const dur = rnd(11, 24);
        const delay = -rnd(0, dur);  // negativ delay -> bir zumda tarqoq joylashadi
        b.style.animation = 'rise ' + dur + 's linear ' + delay + 's infinite';
      }

      function pop(b){
        if(b.dataset.pop) return;
        b.dataset.pop = '1';
        // joriy holatni (pozitsiya + shaffoflik) muzlatamiz, keyin joyida yoramiz
        const cs = getComputedStyle(b);
        const tr = cs.transform === 'none' ? '' : cs.transform;
        const op = cs.opacity;
        b.style.animation = 'none';
        b.style.transform = tr;
        b.style.opacity = op;
        b.style.transition = 'none';
        void b.offsetWidth;
        b.style.transition = 'transform .4s cubic-bezier(.2,.8,.3,1), opacity .4s ease-out';
        b.style.transform = (tr ? tr + ' ' : '') + 'scale(2)';
        b.style.opacity = '0';
        setTimeout(()=>{ spawn(b); delete b.dataset.pop; }, 410);  // yorilgach qaytadan ko'tariladi
      }

      for(let i=0;i<N;i++){
        const b = document.createElement('span');
        b.className = 'bubble';
        wrap.appendChild(b);
        spawn(b);
      }
      // kursor sharchaga tegsa — yoriladi
      wrap.addEventListener('pointerover', (e)=>{
        const b = e.target.closest('.bubble');
        if(b) pop(b);
      });
    })();
  </script>

</body>
</html>
